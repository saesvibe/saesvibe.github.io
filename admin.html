<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Little Joys</title>
  <style>
    /* Simple clean style for the admin page */
    body {
      font-family: 'Inter', sans-serif;
      background: #fff0f5;
      color: #332202;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .admin-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(143, 115, 126, 0.15);
      width: 100%;
      max-width: 500px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 10px;
      color: #A25D96;
    }
    p {
      margin-bottom: 24px;
      color: #9C8B79;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      color: #332202;
    }
    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(51, 34, 2, 0.1);
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      box-sizing: border-box;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #f9d7e1;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f9d7e1, #f0e0e3);
      border: none;
      border-radius: 999px;
      color: #3e2731;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .message {
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; display: block; }
    .error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>

  <div class="admin-card">
    <h1>Secret Admin ✨</h1>
    <p>Add new Little Joys securely.</p>

    <div>
      <label for="monthSelect">Select Month</label>
      <select id="monthSelect">
        <option value="0">March 2026</option>
        <option value="1">April 2026</option>
        <option value="2">May 2026</option>
        <option value="3">June 2026</option>
      </select>

      <label for="joyInput">New Joy</label>
      <input type="text" id="joyInput" placeholder="Type something sweet..." />

      <button id="saveBtn">Save to Database</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 1. CONFIGURATION
    const SUPABASE_URL = "https://urfozryoqwywjnvbrqmt.supabase.co";
    // REPLACE THIS WITH YOUR REAL KEY (the one starting with eyJ...)
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyZm96cnlvcXd5d2pudmJycW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODA1OTEsImV4cCI6MjA4OTE1NjU5MX0.JJrAavUWi_WISw58LxGSk6g6sAh_GrVJQ_egPDj1JAw"; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. DOM ELEMENTS
    const saveBtn = document.getElementById("saveBtn");
    const joyInput = document.getElementById("joyInput");
    const monthSelect = document.getElementById("monthSelect");
    const messageDiv = document.getElementById("message");

    // 3. SAVE LOGIC
    saveBtn.addEventListener("click", async () => {
      const text = joyInput.value.trim();
      const monthIndex = parseInt(monthSelect.value);

      if (!text) {
        showMessage("Please write something first!", false);
        return;
      }

      // Insert into Supabase
      const { data, error } = await supabaseClient
        .from("little_joys")
        .insert([{ 
          title: text, 
          month_index: monthIndex 
        }]);

      if (error) {
        console.error(error);
        showMessage("Error saving! Check console.", false);
      } else {
        showMessage("Saved successfully! ✨", true);
        joyInput.value = ""; // Clear input
      }
    });

    function showMessage(text, isSuccess) {
      messageDiv.textContent = text;
      messageDiv.className = "message " + (isSuccess ? "success" : "error");
    }
  </script>

</body>
</html>
